name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Go tests
        run: npm run test:go

      # Builds the single binary with the frontend embedded — the same artifact
      # the end-to-end tests drive, so a build break fails here with a clear message.
      - name: Build (frontend + binary)
        run: npm run build:all

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e
        env:
          # The binary was just built by the step above.
          FLOWSTOCK_SKIP_BUILD: '1'

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
