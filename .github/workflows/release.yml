name: Release

# On tag vX.Y.Z:
#   - version-guard: tag must equal both VERSION and package.json's "version"
#     (the two places a release number is declared) before anything builds.
#   - frontend: `vite build` once, shared as an artifact — the Go build steps
#     below are pure cross-compilation and shouldn't each pay for npm/vite.
#   - build: the single embedded-frontend binary (`-tags embed_frontend`, see
#     backend/cmd/flowstock/frontend_embed.go), cross-compiled for
#     linux/amd64, linux/arm64, darwin/amd64, darwin/arm64. CGO_ENABLED=0 —
#     the sqlite driver is modernc.org/sqlite (pure Go) and the DMTAP sync
#     bindings are a vendored WASM module (third_party/dmtapsync), so no C
#     toolchain is needed to cross-compile.
#   - release: one GitHub Release with all four archives + SHA256SUMS.txt.
#
# The container image for the same tag is a separate concern — see
# Dockerfile; this workflow does not build or push it.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  version-guard:
    name: tag matches VERSION
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tag == VERSION == package.json
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(tr -d '[:space:]' < VERSION)"
          pkg="$(node -p "require('./package.json').version")"
          echo "tag=$tag VERSION=$ver package.json=$pkg"
          if [ "$tag" != "$ver" ] || [ "$tag" != "$pkg" ]; then
            echo "::error::Version mismatch — bump VERSION and package.json to match the tag before pushing it"
            exit 1
          fi

  test:
    name: go test
    needs: version-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go test ./backend/...

  frontend:
    name: build frontend
    needs: version-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: [test, frontend]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: backend/cmd/flowstock/dist

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          version="${GITHUB_REF_NAME#v}"
          name="flowstock_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}"
          mkdir -p "dist/${name}"
          go build -tags embed_frontend -trimpath \
            -ldflags "-s -w -X main.Version=${version}" \
            -o "dist/${name}/flowstock" ./backend/cmd/flowstock
          cp README.md CHANGELOG.md LICENSE flowstock.config.example.json "dist/${name}/"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        working-directory: dist
        run: sha256sum -- * > SHA256SUMS.txt && cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
          body: |
            Single self-contained `flowstock` binary (frontend embedded) for each platform, plus `SHA256SUMS.txt` covering every attached file.

            Container image: build `Dockerfile` yourself with `--build-arg VERSION=${{ github.ref_name }}`, or watch for a published `ghcr.io` tag if this repo wires that up separately.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
